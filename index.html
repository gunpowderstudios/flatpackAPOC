<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APOC Flatpack Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#202020;color:#f5f5f5}
header{padding:20px;background:#111;border-bottom:3px solid #d0a53b}
.wrap{display:grid;grid-template-columns:380px 1fr;gap:20px;padding:20px}
.panel{background:#2d2d2d;border-radius:12px;padding:18px}
label{display:block;margin:12px 0 6px;font-weight:bold}
input,select,button{width:100%;padding:10px;border-radius:8px;border:none;font-size:15px}
button{margin-top:12px;background:#d0a53b;font-weight:bold;cursor:pointer}
button:hover{background:#f0c95a}
button.secondary{background:#444;color:#fff}
.smallGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.uploadBlock{border:1px solid #444;border-radius:10px;padding:10px;margin-bottom:10px;background:#242424}
.uploadRow{display:grid;grid-template-columns:1fr 105px;gap:10px}
.canvasBox{overflow:auto;background:#666;border-radius:12px;padding:20px;text-align:center}
canvas{background:#fff;max-width:100%;height:auto;box-shadow:0 6px 20px rgba(0,0,0,.5)}
.note{font-size:13px;color:#ccc;line-height:1.4;margin-top:14px}
@media(max-width:900px){.wrap{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
<h1>Flat Pack APOC Building Generator</h1>
<p>Create printable cardboard building templates from real photographs.</p>
</header>
<div class="wrap">
<div class="panel">
<label>Template Title</label>
<input type="text" id="templateTitle" value="Enter Building Name">
<button onclick="saveProject()">Save Building Project JSON</button>
<button class="secondary" onclick="document.getElementById('projectLoader').click()">Load Building Project JSON</button>
<input type="file" id="projectLoader" accept=".json" style="display:none">
<div class="uploadBlock"><label>Front</label><div class="uploadRow"><input type="file" id="frontImg" accept="image/*"><select id="frontRot"><option value="0" selected>0°</option><option value="90">90°</option><option value="180">180°</option><option value="270">270°</option></select></div></div>
<div class="uploadBlock"><label>Back</label><div class="uploadRow"><input type="file" id="backImg" accept="image/*"><select id="backRot"><option value="0">0°</option><option value="90">90°</option><option value="180" selected>180°</option><option value="270">270°</option></select></div></div>
<div class="uploadBlock"><label>Left</label><div class="uploadRow"><input type="file" id="leftImg" accept="image/*"><select id="leftRot"><option value="0">0°</option><option value="90" selected>90°</option><option value="180">180°</option><option value="270">270°</option></select></div></div>
<div class="uploadBlock"><label>Right</label><div class="uploadRow"><input type="file" id="rightImg" accept="image/*"><select id="rightRot"><option value="0">0°</option><option value="90">90°</option><option value="180">180°</option><option value="270" selected>270°</option></select></div></div>
<div class="uploadBlock"><label>Top / Roof</label><div class="uploadRow"><input type="file" id="topImg" accept="image/*"><select id="topRot"><option value="0" selected>0°</option><option value="90">90°</option><option value="180">180°</option><option value="270">270°</option></select></div></div>
<div class="smallGrid">
<div><label>Width mm</label><input type="number" id="boxW" value="100"></div>
<div><label>Depth mm</label><input type="number" id="boxD" value="100"></div>
<div><label>Height mm</label><input type="number" id="boxH" value="80"></div>
<div><label>Glue Tab mm</label><input type="number" id="tabSize" value="8"></div>
</div>
<label>Paper</label>
<select id="paperLayout"><option value="portrait" selected>A4 Portrait</option><option value="landscape">A4 Landscape</option></select>
<label>Layout</label>
<select id="netLayout"><option value="cross" selected>Compact Cross Layout</option><option value="strip">Old Strip Layout</option></select>
<label>Print Scale</label>
<select id="scaleMode"><option value="fit">Auto Fit To Page</option><option value="actual" selected>Actual Size / 100%</option></select>
<label>Image Fit</label>
<select id="fitMode"><option value="fill">Fill Panel</option><option value="fit">Fit Whole Image</option><option value="stretch">Stretch To Panel</option></select>
<button onclick="generateTemplate()">Generate Template</button>
<button onclick="downloadPNG()">Download PNG</button>
<button onclick="downloadPDF()">Download PDF</button>
<div class="note">Compact Cross Layout uses the roof in the centre with walls folding around it.</div>
</div>
<div class="panel"><div class="canvasBox"><canvas id="templateCanvas"></canvas></div></div>
</div>
<script>
const canvas=document.getElementById('templateCanvas');
const ctx=canvas.getContext('2d');
const loaded={front:null,back:null,left:null,right:null,top:null};
const imageData={front:null,back:null,left:null,right:null,top:null};
const keys=['front','back','left','right','top'];
[['frontImg','front'],['backImg','back'],['leftImg','left'],['rightImg','right'],['topImg','top']].forEach(([id,key])=>{
 document.getElementById(id).addEventListener('change',e=>{
 const file=e.target.files[0]; if(!file)return;
 const reader=new FileReader();
 reader.onload=ev=>{
 imageData[key]=ev.target.result;
 const img=new Image();
 img.onload=()=>{loaded[key]=img;generateTemplate();};
 img.src=ev.target.result;
 };
 reader.readAsDataURL(file);
 });
});
['templateTitle','boxW','boxD','boxH','tabSize','paperLayout','netLayout','scaleMode','fitMode','frontRot','backRot','leftRot','rightRot','topRot'].forEach(id=>{
 const el=document.getElementById(id);
 el.addEventListener('input',generateTemplate);
 el.addEventListener('change',generateTemplate);
});
function getPaper(){
 const layout=document.getElementById('paperLayout').value;
 if(layout==='landscape') return {width:3508,height:2480,orientation:'landscape'};
 return {width:2480,height:3508,orientation:'portrait'};
}
function getRotation(key){return Number(document.getElementById(key+'Rot').value||0);}
function drawRotatedImage(img,x,y,w,h,rotation){
 ctx.save();ctx.beginPath();ctx.rect(x,y,w,h);ctx.clip();
 ctx.translate(x+w/2,y+h/2);ctx.rotate(rotation*Math.PI/180);
 const rotated=rotation===90||rotation===270;
 const mode=document.getElementById('fitMode').value;
 if(mode==='stretch'){
 if(rotated)ctx.drawImage(img,-h/2,-w/2,h,w);
 else ctx.drawImage(img,-w/2,-h/2,w,h);
 ctx.restore();return;
 }
 const imgW=rotated?img.height:img.width;
 const imgH=rotated?img.width:img.height;
 const ratio=imgW/imgH;
 const boxRatio=w/h;
 let drawW,drawH;
 if(mode==='fill'){
 if(ratio>boxRatio){drawH=h;drawW=h*ratio;}else{drawW=w;drawH=w/ratio;}
 }else{
 if(ratio>boxRatio){drawW=w;drawH=w/ratio;}else{drawH=h;drawW=h*ratio;}
 }
 if(rotated)ctx.drawImage(img,-drawH/2,-drawW/2,drawH,drawW);
 else ctx.drawImage(img,-drawW/2,-drawH/2,drawW,drawH);
 ctx.restore();
}
function drawPanel(img,x,y,w,h,key){ctx.fillStyle='#f2f2f2';ctx.fillRect(x,y,w,h);if(img)drawRotatedImage(img,x,y,w,h,getRotation(key));ctx.strokeStyle='#000';ctx.lineWidth=2;ctx.strokeRect(x,y,w,h);}
function drawTab(points){ctx.beginPath();ctx.moveTo(points[0][0],points[0][1]);for(let i=1;i<points.length;i++)ctx.lineTo(points[i][0],points[i][1]);ctx.closePath();ctx.fillStyle='#fff6cc';ctx.fill();ctx.strokeStyle='#000';ctx.lineWidth=2;ctx.stroke();}
function drawFold(x1,y1,x2,y2){ctx.save();ctx.setLineDash([5,5]);ctx.strokeStyle='#777';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore();}
function drawCrossNet(x,y,W,D,H,T){
 const topX=x+H,topY=y+H,leftX=x,leftY=topY,rightX=topX+W,rightY=topY,backX=topX,backY=y,frontX=topX,frontY=topY+D;
 drawPanel(loaded.top,topX,topY,W,D,'top');
 drawPanel(loaded.back,backX,backY,W,H,'back');
 drawPanel(loaded.front,frontX,frontY,W,H,'front');
 drawPanel(loaded.left,leftX,leftY,H,D,'left');
 drawPanel(loaded.right,rightX,rightY,H,D,'right');

 // On very small buildings, a full-width bevel can cross over itself.
 // This keeps the glue tab full depth, but makes the side slants shallower.
 const tabInset=Math.max(4,Math.min(T,H*0.18));

 drawTab([[leftX+tabInset,leftY-T],[leftX+H-tabInset,leftY-T],[leftX+H,leftY],[leftX,leftY]]);
 drawTab([[leftX,leftY+D],[leftX+H,leftY+D],[leftX+H-tabInset,leftY+D+T],[leftX+tabInset,leftY+D+T]]);
 drawTab([[rightX+tabInset,rightY-T],[rightX+H-tabInset,rightY-T],[rightX+H,rightY],[rightX,rightY]]);
 drawTab([[rightX,rightY+D],[rightX+H,rightY+D],[rightX+H-tabInset,rightY+D+T],[rightX+tabInset,rightY+D+T]]);
 drawFold(topX,topY,topX+W,topY);
 drawFold(topX,topY+D,topX+W,topY+D);
 drawFold(topX,topY,topX,topY+D);
 drawFold(topX+W,topY,topX+W,topY+D);
}
function generateTemplate(){
 const paper=getPaper();canvas.width=paper.width;canvas.height=paper.height;
 ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);
 const MM=300/25.4;
 const Wmm=Number(document.getElementById('boxW').value);
 const Dmm=Number(document.getElementById('boxD').value);
 const Hmm=Number(document.getElementById('boxH').value);
 const Tmm=Number(document.getElementById('tabSize').value);
 let W=Wmm*MM,D=Dmm*MM,H=Hmm*MM,T=Tmm*MM;
 let netW=H+W+H,netH=H+D+H+T;
 const margin=118,topSafe=250,bottomSafe=118;
 const availW=canvas.width-(margin*2);
 const availH=canvas.height-topSafe-bottomSafe;
 const scaleMode=document.getElementById('scaleMode').value;
 const scale=scaleMode==='actual'?1:Math.min(availW/netW,availH/netH);
 W*=scale;D*=scale;H*=scale;T*=scale;netW*=scale;netH*=scale;
 const title=document.getElementById('templateTitle').value||'APOC Building';
 ctx.fillStyle='#111';ctx.textAlign='center';ctx.textBaseline='middle';
 ctx.font='bold 78px Arial';
 ctx.fillText(title,canvas.width/2,118);
 ctx.font='28px Arial';
 ctx.fillText('Cut solid lines. Fold dotted lines. Glue the pale yellow tabs.',canvas.width/2,185);
 const startX=(canvas.width-netW)/2;
 const startY=topSafe+((availH-netH)/2);
 drawCrossNet(startX,startY,W,D,H,T);
 const printedW=(Wmm*scale).toFixed(1);
 const printedD=(Dmm*scale).toFixed(1);
 const printedH=(Hmm*scale).toFixed(1);
 ctx.font='26px Arial';
 ctx.fillText(`Final model approx ${printedW}mm W x ${printedD}mm D x ${printedH}mm H`,canvas.width/2,canvas.height-45);
}
function safeFileName(name){return(name||'apoc-building').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');}
function downloadPNG(){generateTemplate();const a=document.createElement('a');a.download=safeFileName(document.getElementById('templateTitle').value)+'.png';a.href=canvas.toDataURL('image/png');a.click();}
function downloadPDF(){generateTemplate();const paper=getPaper();const{jsPDF}=window.jspdf;const pdf=new jsPDF({orientation:paper.orientation,unit:'mm',format:'a4'});const pageW=pdf.internal.pageSize.getWidth();const pageH=pdf.internal.pageSize.getHeight();pdf.addImage(canvas.toDataURL('image/png',1),'PNG',0,0,pageW,pageH);pdf.save(safeFileName(document.getElementById('templateTitle').value)+'.pdf');}
function saveProject(){
 const project={
  title:document.getElementById('templateTitle').value,
  settings:{
   width:document.getElementById('boxW').value,
   depth:document.getElementById('boxD').value,
   height:document.getElementById('boxH').value,
   tab:document.getElementById('tabSize').value,
   paperLayout:document.getElementById('paperLayout').value,
   netLayout:document.getElementById('netLayout').value,
   scaleMode:document.getElementById('scaleMode').value,
   fitMode:document.getElementById('fitMode').value
  },
  rotations:{
   front:document.getElementById('frontRot').value,
   back:document.getElementById('backRot').value,
   left:document.getElementById('leftRot').value,
   right:document.getElementById('rightRot').value,
   top:document.getElementById('topRot').value
  },
  images:imageData
 };
 const blob=new Blob([JSON.stringify(project,null,2)],{type:'application/json'});
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download=safeFileName(project.title)+'.json';
 a.click();
 URL.revokeObjectURL(a.href);
}

function setValueIfExists(id,value){
 const el=document.getElementById(id);
 if(el && value!==undefined && value!==null) el.value=value;
}

document.getElementById('projectLoader').addEventListener('change',e=>{
 const file=e.target.files[0];
 if(!file)return;
 const reader=new FileReader();
 reader.onload=ev=>{
  try{
   const project=JSON.parse(ev.target.result);
   setValueIfExists('templateTitle',project.title||'APOC Building');
   const s=project.settings||{};
   setValueIfExists('boxW',s.width);
   setValueIfExists('boxD',s.depth);
   setValueIfExists('boxH',s.height);
   setValueIfExists('tabSize',s.tab);
   setValueIfExists('paperLayout',s.paperLayout||'portrait');
   setValueIfExists('netLayout',s.netLayout||'cross');
   setValueIfExists('scaleMode',s.scaleMode||'actual');
   setValueIfExists('fitMode',s.fitMode||'fill');

   const r=project.rotations||{};
   keys.forEach(key=>{
    setValueIfExists(key+'Rot',r[key]);
    imageData[key]=project.images&&project.images[key]?project.images[key]:null;
    loaded[key]=null;
   });

   const imageLoaders=[];
   keys.forEach(key=>{
    if(imageData[key]){
     imageLoaders.push(new Promise(resolve=>{
      const img=new Image();
      img.onload=()=>{loaded[key]=img;resolve();};
      img.onerror=()=>resolve();
      img.src=imageData[key];
     }));
    }
   });

   Promise.all(imageLoaders).then(()=>generateTemplate());
  }catch(err){
   alert('This JSON file could not be loaded. Please check it is a saved APOC building project.');
   console.error(err);
  }
  e.target.value='';
 };
 reader.readAsText(file);
});

generateTemplate();
</script>
</body>
</html>
