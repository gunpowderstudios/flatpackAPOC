<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Flat Pack APOC - Box Template Maker</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#202020;
  color:#f5f5f5;
}

header{
  padding:22px;
  background:#111;
  border-bottom:3px solid #d0a53b;
}

header h1{
  margin:0 0 6px;
  font-size:28px;
}

header p{
  margin:0;
  color:#ccc;
}

.wrap{
  display:grid;
  grid-template-columns:390px 1fr;
  gap:20px;
  padding:20px;
}

.panel{
  background:#2d2d2d;
  border:1px solid #444;
  border-radius:12px;
  padding:18px;
  box-shadow:0 6px 20px rgba(0,0,0,.35);
}

h2{
  margin-top:0;
  font-size:20px;
  color:#ffd66b;
}

label{
  display:block;
  margin:14px 0 6px;
  font-weight:bold;
}

input,select,button{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #666;
  font-size:15px;
}

input,select{
  background:#fff;
  color:#111;
}

button{
  margin-top:12px;
  border:none;
  background:#d0a53b;
  color:#111;
  font-weight:900;
  cursor:pointer;
}

button:hover{
  background:#f0c95a;
}

.note{
  font-size:13px;
  line-height:1.45;
  color:#cfcfcf;
  background:#1f1f1f;
  padding:12px;
  border-radius:8px;
  margin-top:14px;
}

.canvasBox{
  overflow:auto;
  background:#777;
  border-radius:12px;
  padding:18px;
  text-align:center;
}

canvas{
  background:white;
  box-shadow:0 6px 20px rgba(0,0,0,.5);
  max-width:100%;
  height:auto;
}

.smallGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.faceGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.previewBox{
  background:#111;
  border:2px solid #444;
  border-radius:10px;
  min-height:220px;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}

.previewBox img{
  width:100%;
  height:auto;
  object-fit:contain;
}

.placeholder{
  color:#777;
  font-size:14px;
  padding:20px;
  line-height:1.5;
  text-align:center;
}

@media(max-width:900px){
  .wrap{
    grid-template-columns:1fr;
  }
}

</style>
</head>

<body>

<header>
<h1>Flat Pack APOC - Boxed Building Template Maker</h1>
<p>Upload building renders and create printable papercraft templates.</p>
</header>

<div class="wrap">

<div class="panel">

<h2>Building Preview</h2>

<div class="previewBox">
  <img id="previewRenderImg" style="display:none;">
  <div id="previewPlaceholder" class="placeholder">
    Upload a 3D beauty render here.<br><br>
    This image appears above the cut-out template.
  </div>
</div>

<label>3D Preview Render</label>
<input type="file" id="previewImg" accept="image/*">

<h2 style="margin-top:24px;">1. Upload Images</h2>

<label>Front Render</label>
<input type="file" id="frontImg" accept="image/*">

<label>Back Render</label>
<input type="file" id="backImg" accept="image/*">

<label>Left Render</label>
<input type="file" id="leftImg" accept="image/*">

<label>Right Render</label>
<input type="file" id="rightImg" accept="image/*">

<label>Top / Roof Render</label>
<input type="file" id="topImg" accept="image/*">

<label>Sky / Background</label>
<input type="file" id="bgImg" accept="image/*">

<h2 style="margin-top:24px;">2. Building Size</h2>

<div class="smallGrid">

<div>
<label>Width mm</label>
<input type="number" id="boxW" value="100">
</div>

<div>
<label>Depth mm</label>
<input type="number" id="boxD" value="50">
</div>

<div>
<label>Height mm</label>
<input type="number" id="boxH" value="55">
</div>

<div>
<label>Glue Tab mm</label>
<input type="number" id="tabSize" value="8">
</div>

</div>

<label>Image Fit Mode</label>

<select id="fitMode">
<option value="whole">Whole Uploaded Image</option>
<option value="fill" selected>Crop To Fill Panel</option>
<option value="width">Width Crop Only</option>
</select>

<div class="smallGrid">

<div>
<label>Sheet Preview Size %</label>
<input type="number" id="sheetPreviewSize" value="48">
</div>

<div>
<label>Image Zoom %</label>
<input type="number" id="imageZoom" value="100">
</div>

<div>
<label>Vertical Move %</label>
<input type="number" id="imageMoveY" value="0">
</div>

<div>
<label>Top Safe Padding %</label>
<input type="number" id="topSafePad" value="15">
</div>

</div>

<label>
<input type="checkbox" id="autoCrop" checked style="width:auto;margin-right:8px;">
Auto-crop transparent / black edges
</label>

<label>
<input type="checkbox" id="useBackground" checked style="width:auto;margin-right:8px;">
Use uploaded background
</label>

<label>
<input type="checkbox" id="showPrintLabels" style="width:auto;margin-right:8px;">
Show labels on final print
</label>

<h2 style="margin-top:24px;">3. Face Mapping</h2>

<div class="faceGrid">

<div>
<label>Template Front Uses</label>
<select id="mapFront">
<option value="front">Front Upload</option>
<option value="right" selected>Right Upload</option>
<option value="back">Back Upload</option>
<option value="left">Left Upload</option>
</select>
</div>

<div>
<label>Template Back Uses</label>
<select id="mapBack">
<option value="back">Back Upload</option>
<option value="left" selected>Left Upload</option>
<option value="front">Front Upload</option>
<option value="right">Right Upload</option>
</select>
</div>

<div>
<label>Template Left Uses</label>
<select id="mapLeft">
<option value="left">Left Upload</option>
<option value="back" selected>Back Upload</option>
<option value="front">Front Upload</option>
<option value="right">Right Upload</option>
</select>
</div>

<div>
<label>Template Right Uses</label>
<select id="mapRight">
<option value="right">Right Upload</option>
<option value="front" selected>Front Upload</option>
<option value="back">Back Upload</option>
<option value="left">Left Upload</option>
</select>
</div>

</div>

<button onclick="generateTemplate()">Generate Template</button>
<button onclick="downloadPNG()">Download PNG</button>
<button onclick="downloadPDF()">Download PDF</button>

</div>

<div class="panel">

<h2>Preview</h2>

<div class="canvasBox">
<canvas id="templateCanvas"></canvas>
</div>

</div>

</div>

<script>

const canvas=document.getElementById('templateCanvas');
const ctx=canvas.getContext('2d');

let loaded={
  preview:null,
  front:null,
  back:null,
  left:null,
  right:null,
  top:null,
  bg:null
};

[
['previewImg','preview'],
['frontImg','front'],
['backImg','back'],
['leftImg','left'],
['rightImg','right'],
['topImg','top'],
['bgImg','bg']
].forEach(([id,key])=>{

  document.getElementById(id).addEventListener('change',e=>{

    const file=e.target.files[0];
    if(!file)return;

    const reader=new FileReader();

    reader.onload=ev=>{

      const img=new Image();

      img.onload=()=>{

        loaded[key]=img;

        if(key==='preview'){
          document.getElementById('previewRenderImg').src=ev.target.result;
          document.getElementById('previewRenderImg').style.display='block';
          document.getElementById('previewPlaceholder').style.display='none';
        }

        generateTemplate();

      };

      img.src=ev.target.result;

    };

    reader.readAsDataURL(file);

  });

});

[
'boxW',
'boxD',
'boxH',
'tabSize',
'imageZoom',
'imageMoveY',
'topSafePad',
'fitMode',
'sheetPreviewSize',
'autoCrop',
'useBackground',
'showPrintLabels',
'mapFront',
'mapBack',
'mapLeft',
'mapRight'
].forEach(id=>{

  const el=document.getElementById(id);

  el.addEventListener('input',generateTemplate);
  el.addEventListener('change',generateTemplate);

});

function line(x1,y1,x2,y2,dashed=false,colour='#000',width=2){

  ctx.save();

  if(dashed){
    ctx.strokeStyle='#999';
    ctx.lineWidth=1;
    ctx.setLineDash([3,4]);
  }else{
    ctx.strokeStyle=colour;
    ctx.lineWidth=width;
  }

  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.lineTo(x2,y2);
  ctx.stroke();

  ctx.restore();
}

function rect(x,y,w,h,dashed=false){
  line(x,y,x+w,y,dashed);
  line(x+w,y,x+w,y+h,dashed);
  line(x+w,y+h,x,y+h,dashed);
  line(x,y+h,x,y,dashed);
}

function drawTab(points){

  ctx.save();

  ctx.fillStyle='#fff7d2';
  ctx.strokeStyle='#000';
  ctx.lineWidth=2;

  ctx.beginPath();

  ctx.moveTo(points[0][0],points[0][1]);

  for(let i=1;i<points.length;i++){
    ctx.lineTo(points[i][0],points[i][1]);
  }

  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  ctx.restore();

}

function drawPanelLabel(text,x,y){

  const showLabels=document.getElementById('showPrintLabels').checked;

  if(!showLabels)return;

  ctx.save();

  ctx.fillStyle='rgba(255,255,255,.82)';
  ctx.fillRect(x-45,y-15,90,30);

  ctx.fillStyle='#000';
  ctx.font='bold 16px Arial';
  ctx.textAlign='center';
  ctx.fillText(text,x,y+6);

  ctx.restore();

}

function getMappedImage(id){
  return loaded[document.getElementById(id).value];
}

function generateTemplate(){

  canvas.width=1400;
  canvas.height=1900;

  ctx.fillStyle='#fff';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  const W=Number(boxW.value)*5;
  const D=Number(boxD.value)*5;
  const H=Number(boxH.value)*5;
  const T=Number(tabSize.value)*5;

  const startX=(canvas.width-(D+W+D+W+T))/2;
  const startY=820;

  //
  // LARGE PREVIEW IMAGE
  //

  if(loaded.preview){

    const maxW=canvas.width*0.62;
    const maxH=canvas.height*(sheetPreviewSize.value/100);

    let drawW=maxW;
    let drawH=maxW*(loaded.preview.height/loaded.preview.width);

    if(drawH>maxH){
      drawH=maxH;
      drawW=maxH*(loaded.preview.width/loaded.preview.height);
    }

    ctx.drawImage(
      loaded.preview,
      (canvas.width-drawW)/2,
      90,
      drawW,
      drawH
    );

  }

  //
  // PANELS
  //

  drawPanel(startX,startY+D,W,H,getMappedImage('mapFront'),'FRONT');

  drawPanel(startX+W,startY+D,D,H,getMappedImage('mapRight'),'RIGHT');

  drawPanel(startX+W+D,startY+D,W,H,getMappedImage('mapBack'),'BACK');

  drawPanel(startX+W+D+W,startY+D,D,H,getMappedImage('mapLeft'),'LEFT');

  drawPanel(startX+W,startY,W,D,loaded.top,'TOP');

  //
  // FOLD LINES
  //

  line(startX+W,startY,startX+W,startY+D,true);

  line(startX+W+D,startY+D,startX+W+D,startY+D+H,true);

  line(startX+W+D+W,startY+D,startX+W+D+W,startY+D+H,true);

  //
  // TOP GLUE TAB
  //

  drawTab([
    [startX+W, startY-T],
    [startX+W+W, startY-T],
    [startX+W+W-T, startY],
    [startX+W+T, startY]
  ]);

  //
  // SIDE GLUE TAB
  //

  drawTab([
    [startX+W+D+W+D, startY+D],
    [startX+W+D+W+D+T, startY+D+T],
    [startX+W+D+W+D+T, startY+D+H-T],
    [startX+W+D+W+D, startY+D+H]
  ]);

}

function drawPanel(x,y,w,h,img,label){

  //
  // BACKGROUND
  //

  if(useBackground.checked && loaded.bg){
    ctx.drawImage(loaded.bg,x,y,w,h);
  }

  //
  // BUILDING
  //

  if(img){

    let drawX=x;
    let drawY=y;
    let drawW=w;
    let drawH=h;

    const zoom=imageZoom.value/100;
    const topPad=topSafePad.value/100;

    drawY+=h*topPad;
    drawH-=h*topPad;

    drawW*=zoom;
    drawH*=zoom;

    drawX+=(w-drawW)/2;
    drawY+=(h-drawH)/2 + (imageMoveY.value*2);

    ctx.drawImage(img,drawX,drawY,drawW,drawH);

  }

  //
  // CUT LINE
  //

  rect(x,y,w,h,false);

  //
  // OPTIONAL LABEL
  //

  drawPanelLabel(label,x+w/2,y+h/2);

}

function downloadPNG(){

  const link=document.createElement('a');

  link.download='flat-pack-apoc-template.png';
  link.href=canvas.toDataURL();

  link.click();

}

function downloadPDF(){

  const {jsPDF}=window.jspdf;

  const pdf=new jsPDF({
    orientation:'portrait',
    unit:'mm',
    format:'a4'
  });

  const img=canvas.toDataURL('image/png');

  pdf.addImage(img,'PNG',0,0,210,297);

  pdf.save('flat-pack-apoc-template.pdf');

}

generateTemplate();

</script>

</body>
</html>
